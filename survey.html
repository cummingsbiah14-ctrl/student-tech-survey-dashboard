<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emerging Technology Questionnaire</title>
</head>
<body>

    <h1>Emerging Technology Questionnaire</h1>
    <p>Please fill out the questions below honestly.</p>

    <form>
        <!-- Question 1: Dropdown Selection -->
        <p>1. Which emerging technology do you use most frequently?</p>
        <select name="primary-tech">
            <option value="ai">Artificial Intelligence (AI)</option>
            <option value="cloud">Cloud Computing</option>
            <option value="blockchain">Blockchain</option>
            <option value="vr">Virtual Reality (VR)</option>
        </select>

        <!-- Question 2: Text Inputs -->
        <p>2. Briefly describe how this technology impacts your daily studies:</p>
        <textarea name="tech-impact" rows="4" cols="50" placeholder="Type your answer here..."></textarea>

        <br><br>
        <button type="submit">Submit Responses</button>
    </form>

    <br>
    <a href="index.html">Back to Home</a>

</body>
</html>
