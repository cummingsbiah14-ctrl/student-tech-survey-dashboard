<!DOCTYPE html>
<html>
<head>
    <title>Survey Form</title>
</head>
<body>

<h1>Student Survey Form</h1>

<form action="thankyou.html">

    <label>Full Name:</label><br>
    <input type="text" required><br><br>

    <label>Which emerging technology do you use most frequently?</label><br>

    <select required>
        <option>Artificial Intelligence</option>
        <option>Cloud Computing</option>
        <option>Blockchain</option>
        <option>Internet of Things</option>
        <option>Virtual Reality</option>
    </select>

    <br><br>

    <label>What is your main purpose for using emerging technologies?</label><br>

    <input type="radio" name="purpose"> Academic Research<br>
    <input type="radio" name="purpose"> Assignments and Projects<br>
    <input type="radio" name="purpose"> Communication<br>
    <input type="radio" name="purpose"> Entertainment<br>

    <br>

    <label>Additional Comments:</label><br>
    <textarea rows="5" cols="40"></textarea>

    <br><br>

    <input type="submit" value="Submit Survey">

</form>

</body>
</html>
